# Render deployment config.
# Render reads this file automatically on every push.
# See https://render.com/docs/blueprint-spec
#
# After committing this file, in the Render dashboard:
#   1. New + → Blueprint
#   2. Connect this repo → Apply
# Render creates the web service + Postgres database from the spec below.
# Generated keys (DJANGO_SECRET_KEY) are filled in automatically.
# You'll be prompted to fill in the STRIPE_* values (or leave them blank).

services:
  - type: web
    name: quickgigs
    runtime: python
    plan: free
    region: frankfurt   # change if you prefer oregon, ohio, singapore, etc.
    branch: main
    # Build: install deps and bake static assets into the image.
    # Migrations are deliberately NOT here — they need the DB which isn't
    # always reachable from the build container on Render's free tier.
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    # Start: migrate first (idempotent, fast), then serve.
    # $PORT is injected by Render at runtime.
    startCommand: |
      python manage.py migrate --noinput && \
      gunicorn quickgigs_project.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DJANGO_SETTINGS_MODULE
        value: quickgigs_project.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true            # Render auto-generates a random value
      - key: DJANGO_ALLOWED_HOSTS
        value: quickgigs-tblp.onrender.com  # rename if Render assigns a different host
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://quickgigs-tblp.onrender.com
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: quickgigs-db
          property: connectionString
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false   # you fill in via dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FEATURED_GIG_PRICE
        value: "9.99"

databases:
  - name: quickgigs-db
    plan: free
    databaseName: quickgigs
    user: quickgigs
    region: frankfurt
