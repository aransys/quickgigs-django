{% if messages %}
  <div class="mx-auto mt-4 max-w-3xl space-y-2 px-4 sm:px-6 lg:px-8" x-data="{ open: true }">
    {% for message in messages %}
      {% with tag=message.tags %}
      <div x-show="open"
           x-init="setTimeout(() => open = false, 6000)"
           x-transition.opacity
           class="flex items-start gap-3 rounded-xl border px-4 py-3 text-sm shadow-sm
                  {% if tag == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-900
                  {% elif tag == 'error' %}border-red-200 bg-red-50 text-red-900
                  {% elif tag == 'warning' %}border-amber-200 bg-amber-50 text-amber-900
                  {% else %}border-sky-200 bg-sky-50 text-sky-900{% endif %}">
        <span class="mt-0.5 flex-shrink-0">
          {% if tag == 'success' %}
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg>
          {% elif tag == 'error' %}
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7 4a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm-1-9a.75.75 0 0 0-.75.75v3.5a.75.75 0 0 0 1.5 0v-3.5A.75.75 0 0 0 10 5Z" clip-rule="evenodd"/></svg>
          {% else %}
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd"/></svg>
          {% endif %}
        </span>
        <p class="flex-1">{{ message }}</p>
        <button type="button" @click="open = false" class="text-current/70 hover:text-current">
          <span class="sr-only">Dismiss</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"/></svg>
        </button>
      </div>
      {% endwith %}
    {% endfor %}
  </div>
{% endif %}
