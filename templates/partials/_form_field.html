{# Render one form field with label, error, and help text. #}
<div class="space-y-1.5">
  <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-ink-800">
    {{ field.label }}{% if field.field.required %}<span class="text-red-500"> *</span>{% endif %}
  </label>
  {{ field }}
  {% if field.help_text %}
    <p class="text-xs text-ink-500">{{ field.help_text }}</p>
  {% endif %}
  {% if field.errors %}
    <ul class="mt-1 space-y-1 text-xs font-medium text-red-600">
      {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
    </ul>
  {% endif %}
</div>
