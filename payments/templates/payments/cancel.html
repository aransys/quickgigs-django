{% extends "base.html" %}

{% block title %}Payment cancelled · {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="mx-auto max-w-xl px-4 py-16 text-center sm:px-6 lg:px-8">
  <span class="mx-auto grid h-16 w-16 place-items-center rounded-full bg-amber-100 text-amber-700">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-8 w-8">
      <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm9-3.75a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75ZM12 16.5a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z" clip-rule="evenodd"/>
    </svg>
  </span>
  <h1 class="mt-6 text-3xl font-bold text-ink-900">Payment cancelled.</h1>
  <p class="mt-3 text-sm text-ink-600">No charge was made. Your gig is still active — it just isn't featured.</p>
  <div class="mt-8 flex flex-wrap justify-center gap-3">
    <a href="{{ gig.get_absolute_url }}" class="rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-700">Back to gig</a>
    <a href="{% url 'gigs:my_gigs' %}" class="rounded-lg bg-white px-4 py-2.5 text-sm font-semibold text-ink-700 ring-1 ring-ink-200 hover:bg-ink-50">My gigs</a>
  </div>
</section>
{% endblock %}
